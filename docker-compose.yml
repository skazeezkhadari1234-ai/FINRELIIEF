version: "3.9"

services:

  backend:

    build: .

    container_name: finrelief-backend

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

    ports:

      - "8000:8000"

    volumes:

      - .:/app

    env_file:

      - .env

    restart: always

  frontend:

    build: ./frontend

    container_name: finrelief-frontend

    working_dir: /app

    command: npm run dev -- --host

    ports:

      - "5173:5173"

    volumes:

      - ./frontend:/app

    depends_on:

      - backend

    restart: always